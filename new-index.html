    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Header / Navigation -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        <img src="assets/img/logo_noushin_bk.png" alt="Noushin Bagherzadeh">
                    </a>
                </div>
                
                <nav class="nav">
                    <button class="mobile-menu-toggle" aria-label="Menu">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                    
                    <ul class="nav-menu">
                        <li><a href="index.html" class="active">Accueil</a></li>
                        <li><a href="biographie.html">À propos</a></li>
                        <li class="has-submenu">
                            <a href="javascript:void(0)">Gallerie</a>
                            <ul class="submenu">
                                <li><a href="exterieur.html">Extérieure</a></li>
                                <li><a href="interieur.html">Intérieur</a></li>
                            </ul>
                        </li>
                        <li><a href="evenements.html">Événement</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>

    <!-- Hero Slideshow -->
    <section class="hero-slideshow">
        <div class="slideshow-container">
            <div class="slide active">
                <img src="assets/img/slideshow_noushinbagherzadeh_1.jpg" alt="Portfolio 1">
            </div>
            <div class="slide">
                <img src="assets/img/slideshow_noushinbagherzadeh_2.jpg" alt="Portfolio 2">
            </div>
            <div class="slide">
                <img src="assets/img/slideshow_noushinbagherzadeh_3.jpg" alt="Portfolio 3">
            </div>
            
            <!-- Navigation arrows -->
            <button class="slide-arrow prev" aria-label="Previous">‹</button>
            <button class="slide-arrow next" aria-label="Next">›</button>
            
            <!-- Dots -->
            <div class="slide-dots">
                <span class="dot active" data-slide="0"></span>
                <span class="dot" data-slide="1"></span>
                <span class="dot" data-slide="2"></span>
            </div>
        </div>
    </section>

    <!-- Content Section -->
    <section class="main-content">
        <div class="container">
            <div class="content-wrapper">
                <h1>Bienvenue</h1>
                <p>Photographe passionnée, je capture les moments qui racontent votre histoire.</p>

    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
